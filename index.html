<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keyboard Event Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="main">

    <h1 class="title">
      Keyboard Event Tracker
    </h1>

    <input 
      type="text"
      id="myinput"
      placeholder="Type something..."
    />

    <div class="output">

      <div class="card">
        <p class="label">Key Pressed</p>
        <p class="value keyPressed">-</p>
      </div>

      <div class="card">
        <p class="label">Key Code</p>
        <p class="value keyCode">-</p>
      </div>

      <div class="card">
        <p class="label">Char Code</p>
        <p class="value charCode">-</p>
      </div>

      <div class="card">
        <p class="label">Event Type</p>
        <p class="value eventType">-</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
