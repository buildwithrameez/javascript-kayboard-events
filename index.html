<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keyboard Event Tracker</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: Arial, Helvetica, sans-serif;

      background: linear-gradient(
        135deg,
        rgb(59, 130, 246),
        rgb(139, 92, 246)
      );

      padding: 20px;
    }

    .main{
      width: 100%;
      max-width: 700px;

      background: rgba(255,255,255,0.12);

      backdrop-filter: blur(12px);

      border: 1px solid rgba(255,255,255,0.2);

      border-radius: 24px;

      padding: 40px;

      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .title{
      text-align: center;
      color: white;

      font-size: 36px;
      margin-bottom: 30px;
      font-weight: bold;
    }

    #myinput{
      width: 100%;

      padding: 18px;

      border: none;
      outline: none;

      border-radius: 14px;

      font-size: 18px;

      background: rgba(255,255,255,0.2);

      color: white;

      transition: 0.3s;
    }

    #myinput::placeholder{
      color: rgba(255,255,255,0.7);
    }

    #myinput:focus{
      background: rgba(255,255,255,0.3);

      transform: scale(1.01);

      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .output{
      margin-top: 30px;

      display: grid;
      grid-template-columns: 1fr 1fr;

      gap: 20px;
    }

    .card{
      background: rgba(255,255,255,0.15);

      border: 1px solid rgba(255,255,255,0.15);

      border-radius: 18px;

      padding: 24px;

      transition: 0.3s;
    }

    .card:hover{
      transform: translateY(-5px);
      background: rgba(255,255,255,0.2);
    }

    .label{
      color: rgba(255,255,255,0.7);

      font-size: 14px;

      margin-bottom: 10px;
    }

    .value{
      color: white;

      font-size: 22px;
      font-weight: bold;

      word-break: break-word;
    }

    @media(max-width: 600px){

      .main{
        padding: 25px;
      }

      .title{
        font-size: 28px;
      }

      .output{
        grid-template-columns: 1fr;
      }

    }

  </style>
</head>

<body>

  <div class="main">

    <h1 class="title">
      Keyboard Event Tracker
    </h1>

    <input 
      type="text"
      id="myinput"
      placeholder="Type something..."
    />

    <div class="output">

      <div class="card">
        <p class="label">Key Pressed</p>
        <p class="value keyPressed">-</p>
      </div>

      <div class="card">
        <p class="label">Key Code</p>
        <p class="value keyCode">-</p>
      </div>

      <div class="card">
        <p class="label">Char Code</p>
        <p class="value charCode">-</p>
      </div>

      <div class="card">
        <p class="label">Event Type</p>
        <p class="value eventType">-</p>
      </div>

    </div>

  </div>

  <script>

    let inputEle = document.querySelector('#myinput');

    const handlekeypress = (event) => {

      document.querySelector('.keyPressed').textContent = event.key;

      document.querySelector('.keyCode').textContent = event.code;

      document.querySelector('.charCode').textContent =
      event.key.charCodeAt(0);

      document.querySelector('.eventType').textContent =
      event.type;
    }

    inputEle.addEventListener('keydown', handlekeypress);

  </script>

</body>
</html>
